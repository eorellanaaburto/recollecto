name: recollecto
description: App para gestionar colecciones.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  archive: ^3.6.1
  shared_preferences: ^2.5.2
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  uuid: ^4.4.0
  intl: any
  crypto: ^3.0.3
  image: ^4.3.0
  postgres: any
  file_picker: ^11.0.2
  file_selector: ^1.1.0
  file_save_directory: ^1.0.4
  local_auth: ^3.0.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: assets/icons/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.png